package: cke5
version: '7.0.0-dev'
author: Friends Of REDAXO
supportpage: https://github.com/FriendsOfREDAXO/cke5/issues

page:
    title: 'translate:title'
    icon: cke5-icon-logo
    perm: admin
    subpages:
        main:
            title: 'translate:main'
            subpages:
                demo:
                    title: 'translate:demo'
                preview:
                    title: 'translate:preview'
        profiles:
            title: 'translate:profiles'
            subpages:
                profiles:
                    title: 'translate:profiles'
                customise:
                    title: 'translate:customise'
                    subpages:
                        global:
                            title: 'translate:global_settings'
                        groups:
                            title: 'translate:style_groups'
                        styles:
                            title: 'translate:styles'
                        snippets:
                            title: 'translate:cke5_snippets'
                export:
                    title: 'translate:profiles_export'
                import:
                    title: 'translate:profiles_import'
        config:
            title: 'translate:config'
        help:
            title: 'translate:help'
            subPath: README.md
        dev:
            title: 'Entwickler'
            subPath: dev.md
        licenses:
            title: 'translate:licenses'
            subPath: LICENSE.md
requires:
    redaxo: '^5.19'
    php:
        version: '>=8.1, <9'
conflicts:
    packages:
        mblock: '<4.3.0'
        mform: '<7.0.0'
